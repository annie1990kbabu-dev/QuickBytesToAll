<title>Login</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

/* Container */
.login-container{
    width:350px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    text-align:center;
}

/* Heading */
.login-title{
    font-size:28px;
    margin-bottom:20px;
    color:#ff4d6d;
}

/* Inputs */
.login-container input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

/* Button */
.login-btn{
    width:100%;
    padding:10px;
    background:#ff4d6d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

.login-btn:hover{
    background:#e63946;
}

/* Register link */
.register-link{
    margin-top:15px;
    display:block;
    color:#333;
}

.register-link a{
    color:#ff4d6d;
    text-decoration:none;
    font-weight:bold;
}

.register-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-container">

<h2 class="login-title">🔐 Login</h2>
{% if error %}
<div style="
    background:#ffe5e5;
    color:#d8000c;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;">
    {{ error }}
</div>
{% endif %}
<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit" class="login-btn">Login</button>

</form>

<p class="register-link">
Don't have an account? 
<a href="{% url 'register' %}">Register</a>
</p>

</div>

</body>
</html>
