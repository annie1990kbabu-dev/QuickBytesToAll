{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Menu</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.menu-container{
    width:90%;
    margin:auto;
}

/* HEADER */
header {
    display:flex;
    justify-content:center;
    padding:20px;
}

.logo-text{
    font-size:28px;
    color:#ff4d6d;
}

/* CATEGORY TITLE */
h3{
    margin-top:40px;
    color:#333;
    border-left:5px solid #ff4d6d;
    padding-left:10px;
}

/* CARD GRID */
.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-top:20px;
}

/* FOOD CARD */
.card{
    width:260px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

/* IMAGE */
.card img{
    width:100%;
    height:170px;
    object-fit:cover;
}

/* CONTENT */
.card-body{
    padding:15px;
}

.card h4{
    margin:10px 0 5px;
}

.price{
    color:#e63946;
    font-weight:bold;
}

/* DESCRIPTION */
.desc{
    font-size:14px;
    color:gray;
    height:40px;
    overflow:hidden;
}

/* BUTTON */
.add-btn{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    background:#ff4d6d;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.add-btn:hover{
    background:#e63946;
}

/* RESPONSIVE */
@media (max-width:768px){
    .cards{
        justify-content:center;
    }
}

.menu-title {
    text-align: center;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 4px;
    margin: 20px 0;

    background: linear-gradient(45deg, #ff4d6d, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    position: relative;
}

/* underline animation */
.menu-title::after {
    content: "";
    width: 0;
    height: 4px;
    background: #ff4d6d;
    display: block;
    margin: 10px auto;
    transition: 0.4s;
}

.menu-title:hover::after {
    width: 140px;
}

/* glow */
.menu-title:hover {
    text-shadow: 0 0 15px rgba(255, 77, 109, 0.7);
}
</style>

</head>

<body>

<div class="menu-container">

<header>
    <h2 class="logo-text">🍔 Quick Bytes</h2>
<a href="{% url 'cart' %}" style="
    background:#ff4d6d;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;">
    🛒 {{ request.session.cart|length|default:0 }}
</a>
</header>

<h2 class="menu-title">MENU</h2>

{% for category in categories %}
<h3>{{ category.name }}</h3>

<div class="cards">

{% for food in category.food_set.all %}
<div class="card">

    <img src="{{ food.image.url }}" alt="{{ food.name }}">

    <div class="card-body">
        <h4>{{ food.name }}</h4>
        <p class="price">₹{{ food.price }}</p>
        <p class="desc">{{ food.description }}</p>

       <a href="{% url 'add_to_cart' food.id %}">
       <button class="add-btn">Add to Cart</button>
</a>
    </div>

</div>
{% endfor %}

</div>
{% endfor %}

</div>

</body>
</html>
