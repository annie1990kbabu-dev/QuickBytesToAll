<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background: #e63946;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Restaurant Admin Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="phone" placeholder="Enter Phone Number" required>

        <button type="submit">Login</button>
    </form>

</div>
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
</body>
</html>
