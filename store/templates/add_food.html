{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Add Food</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

/* FORM CONTAINER */
.form-container{
    width:400px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* TITLE */
.form-title{
    text-align:center;
    color:#ff4d6d;
    margin-bottom:20px;
}

/* INPUTS */
.form-container input,
.form-container select,
.form-container textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

/* BUTTON */
.submit-btn{
    width:100%;
    padding:10px;
    background:#ff4d6d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.submit-btn:hover{
    background:#e63946;
}

/* BACK BUTTON */
.back-btn{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#333;
    text-decoration:none;
}

.back-btn:hover{
    color:#ff4d6d;
}

</style>

</head>

<body>

<div class="form-container">

<h2 class="form-title">🍔 Add Food Item</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="submit-btn">Save Food</button>
</form>

<a href="{% url 'dashboard' %}" class="back-btn">⬅ Back to Dashboard</a>

</div>

</body>
</html>
