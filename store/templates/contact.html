{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

body{
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

/* Container */
.contact-container{
    width:60%;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    text-align:center;
}

/* Heading */
.contact-title{
    font-size:32px;
    margin-bottom:20px;
    color:#ff4d6d;
    position:relative;
}

/* underline effect */
.contact-title::after{
    content:"";
    width:0;
    height:3px;
    background:#ff4d6d;
    display:block;
    margin:10px auto;
    transition:0.4s;
}

.contact-title:hover::after{
    width:120px;
}

/* Info */
.contact-info{
    margin:20px 0;
    font-size:18px;
    color:#333;
}

/* Button */
.back-btn{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#ff4d6d;
    color:white;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
}

.back-btn:hover{
    background:#e63946;
}

/* Responsive */
@media (max-width:768px){
    .contact-container{
        width:90%;
    }
}

</style>

</head>

<body>

<div class="contact-container">

<h2 class="contact-title">📞 Contact Us</h2>

<div class="contact-info">
    <p>📧 Email: support@quickbytes.com</p>
    <p>📱 Phone: +91 9876543210</p>
</div>

<a href="{% url 'home' %}" class="back-btn">⬅ Back to Home</a>

</div>

</body>
</html>
